<!DOCTYPE html>
<html>
<head>
<title>Book Card</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #605651;              
        display: flex;                   
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    section {
        width: 320px;                   
        padding: 25px;                   
        margin: 30px;                    
        border: 1px solid #333;
        background: #c5dadb;           
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    section img {
        width: 100%;
        border-radius: 10px;
    }

    h2 {
        margin: 15px 0 10px;
        font-size: 22px;                 
        color: #333;
    }

    p {
        margin: 10px 0;
        font-size: 16px;                
        color: #555;
    }

    button {
        margin-top: 15px;
        padding: 12px 20px;
        background: #6a8c98;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #5e21a8;
    }
</style>
</head>

<body>

<section>
    <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794" alt="Book">

    <h2>Learning Web Design</h2>

    <p>A beginner-friendly book to learn HTML and CSS step by step.</p>

    <button>Read Now</button>
</section>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Food Display</title>

<style>

h1 {
    color: darkred;
    text-align: center;
}


h2 {
    display: block;
    background: lightyellow;
    padding: 10px;
}


h3 {
    display: inline;
    background: lightgreen;
    padding: 5px;
}


h4 {
    display: inline-block;
    width: 120px;
    background: peachpuff;
    padding: 10px;
    margin: 5px;
}


img {
    width: 200px;
    height: 200px;
    display: block;
    margin-top: 10px;
}

</style>
</head>

<body>

<h1> Food Menu Display</h1>
<h2> Pizza</h2>
<h2>Burger</h2>

<br>

<h3> Apple</h3>
<h3> Banana</h3>

<br><br>

<h4> Fries</h4>
<h4> Hotdog</h4>

<br><br>

<img src="https://img.freepik.com/free-photo/top-view-delicious-food-composition_23-2148825156.jpg">

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>small food list</title>

<style>

header {
    position: fixed;
    top: 0;
    width: 100%;
    background: lightcoral;
    color: white;
    padding: 10px;
    text-align: center;
}
h2 {
    margin-top: 60px;
    text-align: center;
    color:#4e786d;
}
section {
    position: relative;
    width: 250px;
    border: 3px solid black;
    padding: 10px;
    margin: 20px auto;
    text-align: center;
}

img {
    width: 150px;
}

h4 {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgb(209, 250, 6);
    padding: 3px;
}
h5 {
    background: lightyellow;
    text-align: center;
    padding: 10px;
}

</style>
</head>

<body>

<header>FOOD MENU (fixed)</header>

<h2>Popular Foods</h2>

<section>
    <h4>Hot</h4>
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Supreme_pizza.jpg">
    <h3>Pizza</h3>
    <p>Tasty and cheesy</p>
</section>

<section>
    <h4>Best</h4>
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/Cheeseburger.jpg">
    <h3>Burger</h3>
    <p>Juicy and delicious</p>
</section>

<section>
    <h4>Crispy</h4>
    <img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5">
    <h3>Fries</h3>
    <p>Crunchy snack</p>
</section>

<h5>Special Offer Available(static)</h5>

</body>
</html>

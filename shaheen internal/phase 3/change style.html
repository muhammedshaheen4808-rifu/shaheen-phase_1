<!DOCTYPE html>
<html>
    <head>
        <title>changecolor</title>
    </head>
<body>

<p id="head">Mohammed Shaheen</p>
<button onclick="changeStyle()">Change Style</button>

<script>
function changeStyle() {
    var p = document.getElementById("head");
    p.style.color = "blue";
    p.style.fontSize = "30px";
}
</script>

</body>
</html>

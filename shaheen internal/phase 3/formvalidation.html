<!DOCTYPE html>
<html>
<head>
    <title>Login Validation</title>
</head>

<body>

<h2>Login Form</h2>

<form id="loginForm">
    <input type="text" id="username" placeholder="Enter Username"><br><br>
    <span id="userError" style="color:red;"></span><br>

    <input type="password" id="password" placeholder="Enter Password"><br><br>
    <span id="passError" style="color:red;"></span><br>

    <button type="submit">Login</button>
</form>

<p id="success" style="color:green;"></p>

<script>
let form = document.getElementById("loginForm");

form.addEventListener("submit", function(e) {
    e.preventDefault(); 

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let userError = document.getElementById("userError");
    let passError = document.getElementById("passError");
    let success = document.getElementById("success");

   
    userError.innerText = "";
    passError.innerText = "";
    success.innerText = "";

    let isValid = true;

    if (username === "") {
        userError.innerText = "Username is required";
        isValid = false;
    } else if (username.length < 3) {
        userError.innerText = "Minimum 3 characters required";
        isValid = false;
    }

    if (password === "") {
        passError.innerText = "Password is required";
        isValid = false;
    } else if (password.length < 6) {
        passError.innerText = "Minimum 6 characters required";
        isValid = false;
    }
    
    if (isValid) {
        success.innerText = "Login successful!";
    }
});
</script>

</body>
</html>
